name: SEP-51 coverage

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Soneso/**'
      - 'tools/sep-51-fixtures/**'
      - '.github/workflows/sep-51-coverage.yml'

permissions:
  contents: read

jobs:
  coverage:
    name: SEP-51 coverage gate (xdebug)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP with xdebug
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, gmp, pcntl, sodium
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-sep51-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-sep51-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run unit tests with coverage
        env:
          XDEBUG_MODE: coverage
        run: vendor/bin/phpunit --testsuite unit --coverage-clover coverage/clover.xml

      - name: SEP-51 coverage gate
        if: github.head_ref == 'sep-51'
        continue-on-error: true
        env:
          COVERAGE_CLOVER: coverage/clover.xml
          DIFF_BASE: main
          STATE_FILE: tools/sep-51-fixtures/orchestration-state.json
          XDEBUG_MODE: coverage
        run: bash tools/sep-51-fixtures/coverage_gate.sh
