name: XDR Generator

on:
  push:
    branches:
      - main
    paths:
      - 'tools/xdr-generator/**'
      - 'Soneso/StellarSDK/Xdr/**'
      - 'Makefile'
      - '.github/workflows/xdr-generator.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'tools/xdr-generator/**'
      - 'Soneso/StellarSDK/Xdr/**'
      - 'Makefile'
      - '.github/workflows/xdr-generator.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xdr-generator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot-tests:
    name: Snapshot Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run snapshot tests
        run: make xdr-generator-test

  drift-detection:
    name: Drift Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath, gmp, pcntl, sodium
          tools: composer:v2

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Regenerate XDR types
        run: make xdr-update

      - name: Check for drift
        run: |
          if ! git diff --exit-code Soneso/StellarSDK/Xdr/ Soneso/StellarSDKTests/Unit/Xdr/Sep51/AllTypesRoundTripTest.php; then
            echo "::error::Generated XDR files are out of date. Run 'make xdr-update' and commit the changes."
            exit 1
          fi
          if [ -n "$(git ls-files --others --exclude-standard Soneso/StellarSDK/Xdr/)" ]; then
            echo "::error::Untracked generated XDR files found. Run 'make xdr-update' and commit the new files."
            git ls-files --others --exclude-standard Soneso/StellarSDK/Xdr/
            exit 1
          fi

  validation:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate generated types
        run: make xdr-validate
